name: review skill tests
skill: ./SKILL.md

scenarios:
  - name: catches security vulnerability
    description: Detects XSS or injection patterns in code changes
    invoke: "/review main"
    assertions:
      - contains: "CRITICAL"
      - contains: "Security"

  - name: provides actionable output
    description: Each finding includes file, line, and description
    invoke: "/review main"
    assertions:
      - matchesPattern: "\\[CRITICAL|WARNING|SUGGESTION\\]"

  - name: includes severity categories
    description: Output format uses bracketed severity labels
    invoke: "/review main"
    assertions:
      - contains: "[CRITICAL]"
      - contains: "[WARNING]"
      - contains: "[SUGGESTION]"
