name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install

      - name: Build
        run: npx tsc --build

      - name: Lint (self-test)
        run: npx tsx packages/cli/src/index.ts lint examples/

      - name: Test
        run: npx vitest run
